<head>

<title>Sam Obila Allela — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #111111;
    --white: #f5f4f0;
  }

  body {
    font-family: 'Raleway', sans-serif;
    background: #e0deda;
    color: #222;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
  }

  /* ── NAV ── */
  .top-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 2.5rem;
    padding: 0.9rem 3rem;
  }
  .top-nav a {
    font-family: 'Raleway', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    transition: opacity .2s;
  }
  .top-nav a:hover { opacity: .6; }
  .top-nav .btn-contact {
    border: 1.5px solid var(--white);
    border-radius: 50px;
    padding: 0.45rem 1.2rem;
  }
  .top-nav .btn-contact:hover { background: var(--white); color: var(--black); opacity: 1; }

  /* ── TITLE BOX ── */
  .title-box {
    border: 2px solid #222;
    padding: 16px 60px;
    margin-top: 60px;
    margin-bottom: 22px;
    display: inline-block;
  }
  .title-box h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
  }

  /* ── BIO ── */
  .bio {
    max-width: 360px;
    font-size: 0.75rem;
    font-weight: 400;
    line-height: 1.85;
    color: #555;
    text-align: center;
    margin-bottom: 18px;
  }

  /* ── ORNAMENT DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 42px;
  }
  .divider .line { width: 50px; height: 1px; background: #aaa; display: block; }
  .ornament { display: flex; gap: 4px; align-items: center; }
  .ornament span { display: block; width: 5px; height: 5px; border: 1px solid #aaa; transform: rotate(45deg); }
  .ornament span.mid { width: 8px; height: 8px; }

  /* ── FORM ── */
  .contact-form {
    width: 100%;
    max-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .field {
    position: relative;
    margin-bottom: 20px;
  }

  .field input,
  .field textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid #555;
    border-left: 1.5px solid #555;
    padding: 10px 10px 10px 12px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #222;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .field input::placeholder,
  .field textarea::placeholder {
    color: #888;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: #222;
  }

  .field textarea {
    height: 100px;
    resize: none;
  }

  /* ── SUBMIT ── */
  .submit-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-top: 28px;
  }
  .submit-wrap .bar { width: 28px; height: 1px; background: #555; display: block; }

  .submit-btn {
    font-family: 'Raleway', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #222;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: opacity .2s;
  }
  .submit-btn:hover { opacity: .5; }

  /* ── SUCCESS MESSAGE ── */
  .success-msg {
    display: none;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
    text-align: center;
    margin-top: 20px;
  }

  /* ── CONTACT LINKS ── */
  .contact-links {
    display: flex;
    gap: 28px;
    margin-top: 52px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .contact-links a {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    transition: color .2s;
  }
  .contact-links a:hover { color: #111; }
  .contact-links svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }

  .divider-bottom {
    width: 100%;
    max-width: 280px;
    height: 1px;
    background: #bbb;
    margin: 40px 0 0;
  }

  .fade-in {
  opacity: 0;
  transform: translateX(-40px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-in.visible {
  opacity: 1;
  transform: translateX(0);
}
</style>
</head>

<script>
  // Show success message on submit (works without Formspree too for demo)
  const form      = document.getElementById('contactForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const name    = document.getElementById('name').value.trim();
    const email   = document.getElementById('email').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const message = document.getElementById('message').value.trim();

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    statusMsg.className = 'status-msg';
    statusMsg.textContent = '';

    try {
      const res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, message })
      });

      const data = await res.json();

      if (res.ok) {
        statusMsg.textContent = '✓  Message sent — thank you!';
        statusMsg.className = 'status-msg success';
        form.reset();
      } else {
        statusMsg.textContent = data.error || 'Something went wrong. Please try again.';
        statusMsg.className = 'status-msg error';
      }
    } catch (err) {
      statusMsg.textContent = 'Network error. Please try again.';
      statusMsg.className = 'status-msg error';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit';
    }
  // Fade-in on scroll
  const fadeEls = document.querySelectorAll('.fade-in');
  const fadeObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 100);
        fadeObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  fadeEls.forEach(el => fadeObserver.observe(el));


  const fadeEls = document.querySelectorAll('.fade-in');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 120);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  fadeEls.forEach(el => observer.observe(el));
</script>
