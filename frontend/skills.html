  body {

    background: #e0deda;

    min-height: 100vh;
    padding: 60px 40px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  :root {
    --black: #111111;
    --white: #f5f4f0;
    --gray: #e8e7e3;
    --accent: #111111;
  }
    .top-nav {
    position: fixed;

    z-index: 100;

  .top-nav a:hover { opacity: .6; }
  .top-nav .btn-contact {
    border: 1.5px solid var(--white);
    border-radius: 50px;
    padding: 0.45rem 1.2rem;
  }
  .top-nav .btn-contact:hover { background: var(--white); color: var(--black); opacity: 1; }


  /* ── TITLE BOX ── */

    text-transform: uppercase;
  }

  .skills-group {

  /* ── ICON GRID ── */
  .icon-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 32px 20px;
    margin-bottom: 10px;
  }

  .skill-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 80px;
    cursor: default;
  }

  .icon-wrap {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.55);
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: transform .2s, box-shadow .2s;
  }
  .skill-item:hover .icon-wrap {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.13);
  }

  .icon-wrap i {
    font-size: 2.2rem;
    line-height: 1;
  }

  /* SVG-based icons (custom) */
  .icon-wrap svg {
    width: 36px;
    height: 36px;
  }

  .skill-name {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    color: #444;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0 42px;
  }
  .divider .line { flex: 1; height: 1px; background: #bbb; }
  .ornament { display: flex; gap: 4px; align-items: center; }
  .ornament span { display: block; width: 5px; height: 5px; border: 1px solid #aaa; transform: rotate(45deg); }
  .ornament span.mid { width: 8px; height: 8px; }

  /* Devicon color overrides */

  /* Contact strip */

    width: 100%;
    background: #d4cfc9;
    padding: 28px 40px;
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: auto;

  .contact-strip a {

    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #444;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .contact-strip svg { width: 13px; height: 13px; fill: currentColor; }

    .fade-in { opacity: 0; transition: opacity 0.7s ease; }
.fade-in.visible { opacity: 1; }
/* Hamburger Styles */
.menu-toggle {
  display: none; /* Hidden on desktop */
  flex-direction: column;
  cursor: pointer;
  gap: 5px;
}

.menu-toggle .bar {
  width: 25px;
  height: 3px;
  background-color: var(--white);
  transition: all 0.3s ease;
}

@media (max-width: 760px) {
  .top-nav {
    justify-content: space-between;
    padding: 0.9rem 2rem;
  }

  .menu-toggle {
    display: flex; /* Show on mobile */
    z-index: 101;
  }

  .nav-links {
    position: fixed;
    top: 0;
    right: -100%; /* Hide off-screen */
    height: 100vh;
    width: 70%;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .nav-links.active {
    right: 0; /* Slide in */
  }

  /* Animate Hamburger to 'X' */
  .menu-toggle.active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
  .menu-toggle.active .bar:nth-child(2) { opacity: 0; }
  .menu-toggle.active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
}

<script> const fadeEls = document.querySelectorAll('.fade-in');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 120);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  fadeEls.forEach(el => observer.observe(el));

  const menu = document.querySelector('#mobile-menu');
  const navLinks = document.querySelector('#nav-links');

  menu.addEventListener('click', () => {
    menu.classList.toggle('active');
    navLinks.classList.toggle('active');
  });

  // Optional: Close menu when a link is clicked
  document.querySelectorAll('.nav-links a').forEach(n => n.addEventListener('click', () => {
    menu.classList.remove('active');
    navLinks.classList.remove('active');
  }));
</script>
